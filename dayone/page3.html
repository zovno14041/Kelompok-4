<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suprematisme</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-fade-in bg-suprematism">
    <div class="transition-overlay" id="transitionOverlay"></div>
    <nav class="navbar" id="navbar">
        <ul>
            <li><a href="page2.html" class="page-transition custom-tooltip" data-tooltip="Go back to Fauvism?">←</a></li>
             <li class="nav-right"><a href="page4.html" class="page-transition custom-tooltip" data-tooltip="Cubism after.">→</a></li>
        </ul>
    </nav>

    <header class="hero-section">
        <h1>galeri suprematisme</h1>
    </header>

    <main class="content">
        <section class="column-section top-row">
            <div class="column">
                <img src="images/nia-suprematisme/images (1).jpg" alt="Placeholder1" class="column-image custom-tooltip" data-tooltip="Click me to learn more!" onclick="openLightbox('images/nia-suprematisme/images (1).jpg', 'White on White (1918)', 'By painting a tilted white square on a white background, Malevich aimed to achieve the ultimate sense of nothingness and the infinite, stripping away even the contrast of color.')">
                <h2>White on White (1918)</h2>
                <p>Kazimir Malevich</p>
            </div>
            <div class="column">
                <img src="images/nia-suprematisme/images (2).jpg" alt="Placeholder2" class="column-image custom-tooltip" data-tooltip="Click me to learn more!" onclick="openLightbox('images/nia-suprematisme/images (2).jpg', 'Proun Series (1919–1924)', 'Lissitzky introduced 3D perspectives into Suprematism. His Proun works an acronym for Project For The Affirmation of The New acted as a bridge between painting and architecture.')">
                <h2>Proun Series (1919–1924)</h2>
                <p>El Lissitzky</p>
            </div>
            <div class="column">
                <img src="images/nia-suprematisme/images (3).jpg" alt="Placeholder3" class="column-image custom-tooltip" data-tooltip="Click me to learn more!" onclick="openLightbox('images/nia-suprematisme/images (3).jpg', 'Painterly Architectonics (1916–1918)', 'Popova combined Suprematist shapes with a sense of Weight. Her works often feature overlapping, colorful planes that look like architectural structures floating in space.')">
                <h2>Painterly Architectonics (1916–1918)</h2>
                <p>Lyubov Popova</p>
            </div>
        </section>

        <section class="column-section bottom-row">
            <div class="column">
                <img src="images/nia-suprematisme/images (4).jpg" alt="Placeholder4" class="column-image custom-tooltip" data-tooltip="Click me to learn more!" onclick="openLightbox('images/nia-suprematisme/images (4).jpg', 'Green Stripe (1917)', 'A masterpiece of minimalist Suprematism, this painting consists of a single green line cutting through a white canvas, emphasizing the raw energy of light and color.')">
                <h2>Green Stripe (1917)</h2>
                <p>Olga Rozanova</p>
            </div>
            <div class="column">
                <img src="images/nia-suprematisme/images (5).jpg" alt="Placeholder5" class="column-image custom-tooltip" data-tooltip="Click me to learn more!" onclick="openLightbox('images/nia-suprematisme/images (5).jpg', 'Suprematism (1916)', 'A close collaborator of Malevich, Kliun’s work often focused on the dynamic interaction and tension between various floating geometric shapes and their relationship to the vacuum of the background.')">
                <h2>Suprematism (1916)</h2>
                <p>Ivan Kliun</p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-page-indicator">
            <a href="index.html">Home</a>
            <a href="page2.html">Fauvisme</a>
            <a href="page3.html" class="current">Suprematisme</a>
            <a href="page4.html">Kubisme</a>
            <a href="page5.html">Pointilisme</a>
            <a href="page6.html">Ekspresionisme</a>
        </div>
    </footer>

    <script>
        // Navbar slide up on scroll
        const navbar = document.getElementById('navbar');
        let lastScroll = 0;
        
        window.addEventListener('scroll', () => {
            const currentScroll = window.scrollY;
            
            if (currentScroll > lastScroll && currentScroll > 100) {
                // Scrolling down - hide navbar
                navbar.style.transform = 'translateY(-100%)';
            } else {
                // Scrolling up - show navbar
                navbar.style.transform = 'translateY(0)';
            }
            
            lastScroll = currentScroll;
        });

        // Page transition with blur effect
        const transitionOverlay = document.getElementById('transitionOverlay');
        const pageTransitionLinks = document.querySelectorAll('.page-transition');

        pageTransitionLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const targetUrl = link.getAttribute('href');
                
                // Activate overlay with blur
                transitionOverlay.classList.add('active');
                
                // Navigate after transition
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 500);
            });
        });

        // Lightbox functions
        function openLightbox(src, title, description) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxTitle = document.getElementById('lightbox-title');
            const lightboxDesc = document.getElementById('lightbox-desc');
            lightboxImg.src = src;
            lightboxTitle.textContent = title;
            lightboxDesc.textContent = description;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        // Custom Tooltip System
        function createTooltips() {
            const tooltipElements = document.querySelectorAll('[data-tooltip]');
            
            tooltipElements.forEach(el => {
                el.addEventListener('mouseenter', (e) => {
                    const text = el.getAttribute('data-tooltip');
                    if (!text) return;
                    
                    const existing = document.querySelector('.js-tooltip');
                    if (existing) existing.remove();
                    
                    const tooltip = document.createElement('div');
                    tooltip.className = 'js-tooltip';
                    tooltip.textContent = text;
                    document.body.appendChild(tooltip);
                    
                    const rect = el.getBoundingClientRect();
                    
                    let top = rect.top - 10;
                    let left = rect.left + (rect.width / 2);
                    
                    if (el.classList.contains('column-image')) {
                        top = rect.bottom + 10;
                    }
                    
                    tooltip.style.cssText = `
                        position: fixed;
                        top: ${top}px;
                        left: ${left}px;
                        transform: translateX(-50%);
                        background: rgba(0, 0, 0, 0.95);
                        color: #fff;
                        padding: 8px 14px;
                        border-radius: 8px;
                        font-size: 13px;
                        font-family: 'Courier New', Courier, monospace;
                        z-index: 10000;
                        pointer-events: none;
                        white-space: nowrap;
                        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
                        border: 1px solid rgba(255, 255, 255, 0.3);
                        opacity: 0;
                        transition: opacity 0.2s ease;
                    `;
                    
                    requestAnimationFrame(() => {
                        tooltip.style.opacity = '1';
                    });
                });
                
                el.addEventListener('mouseleave', () => {
                    const tooltip = document.querySelector('.js-tooltip');
                    if (tooltip) {
                        tooltip.style.opacity = '0';
                        setTimeout(() => tooltip.remove(), 200);
                    }
                });
            });
        }

        document.addEventListener('DOMContentLoaded', createTooltips);
    </script>

    <!-- Lightbox -->
    <div id="lightbox" onclick="closeLightbox()">
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <img id="lightbox-img" src="" alt="Full size image">
            <h3 id="lightbox-title"></h3>
            <p id="lightbox-desc"></p>
        </div>
    </div>
</body>
</html>
